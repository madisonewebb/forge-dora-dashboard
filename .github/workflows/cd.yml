name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  id-token: write  # required for OIDC
  contents: read

jobs:
  deploy:
    name: Deploy to ECS Fargate
    runs-on: ubuntu-latest
    environment: production
    # Only deploy when CI passes — prevents shipping broken builds
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        id: build-backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/dora-backend:${{ github.event.workflow_run.head_sha }}
            ${{ steps.ecr-login.outputs.registry }}/dora-backend:latest
          cache-from: type=registry,ref=${{ steps.ecr-login.outputs.registry }}/dora-backend:latest
          cache-to: type=inline

      - name: Build and push frontend image
        id: build-frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/dora-frontend:${{ github.event.workflow_run.head_sha }}
            ${{ steps.ecr-login.outputs.registry }}/dora-frontend:latest
          cache-from: type=registry,ref=${{ steps.ecr-login.outputs.registry }}/dora-frontend:latest
          cache-to: type=inline

      - name: Substitute placeholders in task definition
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: envsubst < ecs-task-definition.json > ecs-task-definition.rendered.json

      - name: Render task definition with new backend image
        id: render-backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs-task-definition.rendered.json
          container-name: backend
          image: ${{ steps.ecr-login.outputs.registry }}/dora-backend:${{ github.event.workflow_run.head_sha }}

      - name: Render task definition with new frontend image
        id: render-frontend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ steps.render-backend.outputs.task-definition }}
          container-name: frontend
          image: ${{ steps.ecr-login.outputs.registry }}/dora-frontend:${{ github.event.workflow_run.head_sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-frontend.outputs.task-definition }}
          service: dora-service
          cluster: dora-cluster
          wait-for-service-stability: true

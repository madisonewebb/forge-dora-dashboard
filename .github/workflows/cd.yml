name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write  # required for OIDC
  contents: read

jobs:
  deploy:
    name: Deploy to ECS Fargate
    runs-on: ubuntu-latest
    environment: production
    # Only deploy when CI passes (skipped on manual dispatch)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Check if images already exist in ECR
        id: ecr-check
        run: |
          SHA=${{ github.event.workflow_run.head_sha }}
          REGISTRY=${{ steps.ecr-login.outputs.registry }}
          backend_exists=false
          frontend_exists=false
          if aws ecr describe-images --repository-name dora-backend --image-ids imageTag=$SHA &>/dev/null; then
            backend_exists=true
          fi
          if aws ecr describe-images --repository-name dora-frontend --image-ids imageTag=$SHA &>/dev/null; then
            frontend_exists=true
          fi
          echo "backend_exists=$backend_exists" >> $GITHUB_OUTPUT
          echo "frontend_exists=$frontend_exists" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        if: steps.ecr-check.outputs.backend_exists == 'false' || steps.ecr-check.outputs.frontend_exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        id: build-backend
        if: steps.ecr-check.outputs.backend_exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          # Single immutable SHA tag — ECR repos are IMMUTABLE so latest/cache
          # tags cannot be overwritten; the ECS deploy uses the SHA tag directly.
          tags: ${{ steps.ecr-login.outputs.registry }}/dora-backend:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        id: build-frontend
        if: steps.ecr-check.outputs.frontend_exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.ecr-login.outputs.registry }}/dora-frontend:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Substitute placeholders in task definition
        env:
          AWS_REGION: us-east-1
        run: |
          export AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          envsubst < ecs-task-definition.json > ecs-task-definition.rendered.json

      - name: Render task definition with new backend image
        id: render-backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs-task-definition.rendered.json
          container-name: backend
          image: ${{ steps.ecr-login.outputs.registry }}/dora-backend:${{ github.event.workflow_run.head_sha }}

      - name: Render task definition with new frontend image
        id: render-frontend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ steps.render-backend.outputs.task-definition }}
          container-name: frontend
          image: ${{ steps.ecr-login.outputs.registry }}/dora-frontend:${{ github.event.workflow_run.head_sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-frontend.outputs.task-definition }}
          service: dora-service
          cluster: dora-cluster
          wait-for-service-stability: true

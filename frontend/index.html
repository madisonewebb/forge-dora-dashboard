<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DORA Metrics Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg:         #070C1B;
        --surface:    #0C1528;
        --surface2:   #111E36;
        --border:     #1A2D52;
        --border2:    #24406E;
        --lime:       #A8FF35;
        --lime-dim:   #6DB81E;
        --teal:       #00D4A8;
        --amber:      #FFB547;
        --red:        #FF5B5B;
        --text:       #D4E4FF;
        --text-muted: #4A6899;
        --text-dim:   #2D4A7A;
        --elite:      #A8FF35;
        --high:       #00D4A8;
        --medium:     #FFB547;
        --low:        #FF5B5B;
        --font-ui:    'Barlow', sans-serif;
        --font-head:  'Barlow Condensed', sans-serif;
        --font-mono:  'Fira Code', monospace;
      }
      html, body, #root {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-ui);
        -webkit-font-smoothing: antialiased;
      }
      body {
        background-image:
          radial-gradient(ellipse 80% 50% at 50% -10%, rgba(168, 255, 53, 0.06) 0%, transparent 60%),
          linear-gradient(180deg, rgba(0, 212, 168, 0.02) 0%, transparent 40%);
        background-attachment: fixed;
      }
      ::selection { background: rgba(168, 255, 53, 0.25); color: var(--text); }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--bg); }
      ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulse-lime {
        0%, 100% { box-shadow: 0 0 0 0 rgba(168,255,53,0); }
        50%       { box-shadow: 0 0 20px 2px rgba(168,255,53,0.15); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

# ─── Server ──────────────────────────────────────────────────────────────────
server.port=8080

# ─── Spring Profile ───────────────────────────────────────────────────────────
spring.profiles.default=dev

# ─── H2 (dev profile only) ───────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:doradb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# ─── JPA ─────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ─── Flyway ──────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ─── GitHub Cache ─────────────────────────────────────────────────────────────
github.cache.ttl-minutes=15

# ─── Actuator ────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-components=always

# ─── GitHub OAuth (Device Flow) ───────────────────────────────────────────────
# Register an OAuth App at https://github.com/settings/developers, enable
# "Device flow", and export GITHUB_CLIENT_ID before starting the backend.
github.oauth.client-id=${GITHUB_CLIENT_ID:}

# ─── Spring AI / Claude ───────────────────────────────────────────────────────
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY:}
spring.ai.anthropic.chat.options.model=claude-sonnet-4-6
